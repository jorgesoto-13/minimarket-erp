<section class="grid gap-6 lg:grid-cols-[360px_minmax(0,1fr)]">
  <div class="h-fit rounded-lg border border-slate-200 bg-white p-6 shadow-lg shadow-slate-200/70">
    <h2 class="mb-5 text-xl font-bold text-slate-900">
      {{ categoriaEnEdicion() ? 'Editar Categor&iacute;a' : 'Nueva Categor&iacute;a' }}
    </h2>

    <form [formGroup]="categoriaForm" (ngSubmit)="guardarCategoria()" class="grid gap-4">
      @if (mensajeError()) {
        <div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm font-semibold text-red-700">
          {{ mensajeError() }}
        </div>
      }

      <div>
        <label class="mb-2 block text-sm font-semibold text-slate-600">Nombre</label>
        <input
          type="text"
          formControlName="nombre"
          class="min-h-11 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 outline-none transition focus:border-emerald-700 focus:ring-4 focus:ring-emerald-700/10">
      </div>

      <button
        type="submit"
        [disabled]="categoriaForm.invalid"
        class="min-h-11 w-full rounded-lg bg-emerald-700 px-4 py-2 font-bold text-white shadow-lg shadow-emerald-700/20 transition hover:-translate-y-0.5 hover:bg-emerald-800 disabled:translate-y-0 disabled:cursor-not-allowed disabled:bg-slate-400 disabled:shadow-none">
        {{ categoriaEnEdicion() ? 'Actualizar Categor&iacute;a' : 'Guardar Categor&iacute;a' }}
      </button>

      @if (categoriaEnEdicion()) {
        <button
          type="button"
          (click)="cancelarEdicion()"
          class="min-h-11 w-full rounded-lg bg-slate-200 px-4 py-2 font-bold text-slate-700 transition hover:bg-slate-300">
          Cancelar
        </button>
      }
    </form>
  </div>

  <div class="overflow-x-auto rounded-lg border border-slate-200 bg-white shadow-lg shadow-slate-200/70">
    <table class="w-full min-w-[520px] text-left">
      <thead class="bg-slate-100 text-xs uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-5 py-4">ID</th>
          <th class="px-5 py-4">Nombre</th>
          <th class="px-5 py-4">Acciones</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-200">
        @for (cat of categorias(); track cat.id) {
          <tr class="transition hover:bg-slate-50">
            <td class="px-5 py-4 text-slate-500">{{ cat.id }}</td>
            <td class="px-5 py-4 font-bold text-slate-900">{{ cat.nombre }}</td>
            <td class="flex gap-3 px-5 py-4">
              <button (click)="cargarParaEditar(cat)" class="font-bold text-blue-700 hover:underline">Editar</button>
              <button (click)="eliminarCategoria(cat.id)" class="font-bold text-red-600 hover:underline">Eliminar</button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="px-5 py-8 text-center text-slate-500">No hay categor&iacute;as.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
