<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Acceso al Minimarket</h2>

    @if (errorMensaje) {
      <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
        {{ errorMensaje }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" class="flex flex-col gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Usuario</label>
        <input type="text" formControlName="username" class="mt-1 block w-full rounded-md border border-gray-300 p-2">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input type="password" formControlName="password" class="mt-1 block w-full rounded-md border border-gray-300 p-2">
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
              class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700 disabled:bg-gray-400">
        Ingresar
      </button>
    </form>
  </div>
</div>
